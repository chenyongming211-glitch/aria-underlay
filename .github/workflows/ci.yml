name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo test
        run: cargo test

  python:
    name: Python Adapter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "adapter-python[test]"

      - name: Generate Python protobuf stubs
        run: |
          python -m grpc_tools.protoc \
            -I proto \
            --python_out=adapter-python/aria_underlay_adapter/proto \
            --grpc_python_out=adapter-python/aria_underlay_adapter/proto \
            proto/aria_underlay_adapter.proto

      - name: Python tests
        working-directory: adapter-python
        run: python -m pytest

