name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo test
        run: cargo test

  python:
    name: Python Adapter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "adapter-python[test]"

      - name: Generate Python protobuf stubs
        run: scripts/generate-python-proto.sh

      - name: Python tests
        working-directory: adapter-python
        run: python -m pytest

  sprint0-integration:
    name: Sprint 0 Integration
    runs-on: ubuntu-latest
    needs: [rust, python]
    strategy:
      fail-fast: false
      matrix:
        fake-profile: ["confirmed", "candidate_only", "running_only", "cli_only"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "adapter-python[test]"

      - name: Generate Python protobuf stubs
        run: scripts/generate-python-proto.sh

      - name: Start fake adapter
        run: |
          ARIA_UNDERLAY_ADAPTER_FAKE=1 \
          ARIA_UNDERLAY_FAKE_PROFILE=${{ matrix.fake-profile }} \
          ARIA_UNDERLAY_ADAPTER_LISTEN=127.0.0.1:50051 \
          python -m aria_underlay_adapter.server > /tmp/aria-underlay-adapter.log 2>&1 &
          echo $! > /tmp/aria-underlay-adapter.pid

      - name: Wait for adapter
        run: |
          python - <<'PY'
          import socket
          import time

          deadline = time.time() + 20
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 50051), timeout=1):
                      raise SystemExit(0)
              except OSError:
                  time.sleep(0.5)
          raise SystemExit("adapter did not open 127.0.0.1:50051")
          PY

      - name: Run capability probe example
        env:
          ARIA_UNDERLAY_ADAPTER_ENDPOINT: http://127.0.0.1:50051
        run: cargo run --example capability_probe

      - name: Adapter logs
        if: always()
        run: cat /tmp/aria-underlay-adapter.log || true

  onboarding-error-integration:
    name: Onboarding Error Integration
    runs-on: ubuntu-latest
    needs: [rust, python]
    strategy:
      fail-fast: false
      matrix:
        include:
          - fake-profile: "auth_failed"
