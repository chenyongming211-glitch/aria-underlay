syntax = "proto3";

package aria_underlay.adapter.v1;

service UnderlayAdapter {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
  rpc GetCurrentState(GetCurrentStateRequest) returns (GetCurrentStateResponse);
  rpc DryRun(DryRunRequest) returns (DryRunResponse);
  rpc Prepare(PrepareRequest) returns (PrepareResponse);
  rpc Commit(CommitRequest) returns (CommitResponse);
  rpc FinalConfirm(FinalConfirmRequest) returns (FinalConfirmResponse);
  rpc Rollback(RollbackRequest) returns (RollbackResponse);
  rpc Verify(VerifyRequest) returns (VerifyResponse);
  rpc Recover(RecoverRequest) returns (RecoverResponse);
  rpc ForceUnlock(ForceUnlockRequest) returns (ForceUnlockResponse);
}

enum Vendor {
  VENDOR_UNSPECIFIED = 0;
  VENDOR_HUAWEI = 1;
  VENDOR_H3C = 2;
  VENDOR_CISCO = 3;
  VENDOR_RUIJIE = 4;
  VENDOR_UNKNOWN = 100;
}

enum BackendKind {
  BACKEND_KIND_UNSPECIFIED = 0;
  BACKEND_KIND_NETCONF = 1;
  BACKEND_KIND_NAPALM = 2;
  BACKEND_KIND_NETMIKO = 3;
  BACKEND_KIND_CLI = 4;
}

enum TransactionStrategy {
  TRANSACTION_STRATEGY_UNSPECIFIED = 0;
  TRANSACTION_STRATEGY_CONFIRMED_COMMIT = 1;
  TRANSACTION_STRATEGY_CANDIDATE_COMMIT = 2;
  TRANSACTION_STRATEGY_RUNNING_ROLLBACK_ON_ERROR = 3;
  TRANSACTION_STRATEGY_BEST_EFFORT_CLI = 4;
  TRANSACTION_STRATEGY_UNSUPPORTED = 100;
}

enum AdapterOperationStatus {
  ADAPTER_OPERATION_STATUS_UNSPECIFIED = 0;
  ADAPTER_OPERATION_STATUS_NO_CHANGE = 1;
  ADAPTER_OPERATION_STATUS_PREPARED = 2;
  ADAPTER_OPERATION_STATUS_COMMITTED = 3;
  ADAPTER_OPERATION_STATUS_ROLLED_BACK = 4;
  ADAPTER_OPERATION_STATUS_FAILED = 5;
  ADAPTER_OPERATION_STATUS_IN_DOUBT = 6;
  ADAPTER_OPERATION_STATUS_CONFIRMED_COMMIT_PENDING = 7;
}

enum RecoveryAction {
  RECOVERY_ACTION_UNSPECIFIED = 0;
  RECOVERY_ACTION_DISCARD_PREPARED_CHANGES = 1;
  RECOVERY_ACTION_ADAPTER_RECOVER = 2;
}

enum AdminState {
  ADMIN_STATE_UNSPECIFIED = 0;
  ADMIN_STATE_UP = 1;
  ADMIN_STATE_DOWN = 2;
}

enum PortModeKind {
  PORT_MODE_KIND_UNSPECIFIED = 0;
  PORT_MODE_KIND_ACCESS = 1;
  PORT_MODE_KIND_TRUNK = 2;
}

enum HostKeyPolicy {
  HOST_KEY_POLICY_UNSPECIFIED = 0;
  HOST_KEY_POLICY_TRUST_ON_FIRST_USE = 1;
  HOST_KEY_POLICY_KNOWN_HOSTS_FILE = 2;
  HOST_KEY_POLICY_PINNED_KEY = 3;
}

enum AclAction {
  ACL_ACTION_UNSPECIFIED = 0;
  ACL_ACTION_PERMIT = 1;
  ACL_ACTION_DENY = 2;
}

enum AclProtocol {
  ACL_PROTOCOL_UNSPECIFIED = 0;
  ACL_PROTOCOL_IP = 1;
  ACL_PROTOCOL_TCP = 2;
  ACL_PROTOCOL_UDP = 3;
  ACL_PROTOCOL_ICMP = 4;
}

enum AclDirection {
  ACL_DIRECTION_UNSPECIFIED = 0;
  ACL_DIRECTION_INBOUND = 1;
  ACL_DIRECTION_OUTBOUND = 2;
}

enum AclKind {
  ACL_KIND_UNSPECIFIED = 0;
  ACL_KIND_ADVANCED_IPV4 = 1;
  ACL_KIND_BASIC_IPV4 = 2;
}

message RequestContext {
  string request_id = 1;
  string tx_id = 2;
  string trace_id = 3;
  string tenant_id = 4;
  string site_id = 5;
}

message DeviceRef {
  string device_id = 1;
  string management_ip = 2;
  uint32 management_port = 3;
  Vendor vendor_hint = 4;
  string model_hint = 5;
  string secret_ref = 6;
  HostKeyPolicy host_key_policy = 7;
  string known_hosts_path = 8;
  string pinned_host_key_fingerprint = 9;
}

message DeviceCapability {
  Vendor vendor = 1;
  string model = 2;
  string os_version = 3;
  repeated string raw_capabilities = 4;
  bool supports_netconf = 5;
  bool supports_candidate = 6;
  bool supports_validate = 7;
  bool supports_confirmed_commit = 8;
  bool supports_persist_id = 9;
  bool supports_rollback_on_error = 10;
  bool supports_writable_running = 11;
  repeated BackendKind supported_backends = 12;
  DeviceModelProfile model_profile = 13;
  repeated YangModuleSummary yang_modules = 14;
}

enum ModelProtocol {
  MODEL_PROTOCOL_UNSPECIFIED = 0;
  MODEL_PROTOCOL_OPENCONFIG_GNMI = 1;
  MODEL_PROTOCOL_OPENCONFIG_NETCONF = 2;
  MODEL_PROTOCOL_VENDOR_NATIVE_YANG = 3;
  MODEL_PROTOCOL_VENDOR_CLI = 4;
}

enum WriteReadiness {
  WRITE_READINESS_UNSPECIFIED = 0;
  WRITE_READINESS_READ_ONLY = 1;
  WRITE_READINESS_WRITE_SAFE = 2;
  WRITE_READINESS_WRITE_REJECTED = 3;
}

message ModelPathSupport {
  ModelProtocol protocol = 1;
  string model = 2;
  string revision = 3;
  string path = 4;
  bool readable = 5;
  bool writable = 6;
  bool verified_on_device = 7;
  repeated string deviations = 8;
  repeated string notes = 9;
}

message YangModuleSummary {
  string name = 1;
  string revision = 2;
  string namespace = 3;
  uint64 schema_size_bytes = 4;
  bool schema_downloaded = 5;
  string format = 6;
}

message DeviceModelProfile {
  string profile_id = 1;
  Vendor vendor = 2;
  string model = 3;
  string os_version = 4;
  repeated ModelPathSupport paths = 5;
  WriteReadiness pbr_write_readiness = 6;
  WriteReadiness bgp_write_readiness = 7;
  repeated string rejection_reasons = 8;
  uint32 yang_module_count = 9;
}

message VlanConfig {
  uint32 vlan_id = 1;
  optional string name = 2;
  optional string description = 3;
}

message PortMode {
  PortModeKind kind = 1;
  optional uint32 access_vlan = 2;
  optional uint32 native_vlan = 3;
  repeated uint32 allowed_vlans = 4;
}

message InterfaceConfig {
  string name = 1;
  AdminState admin_state = 2;
  optional string description = 3;
  PortMode mode = 4;
}

message AclEndpoint {
  string address = 1;
  string wildcard = 2;
}

message AclRule {
  uint32 sequence = 1;
  AclAction action = 2;
  AclProtocol protocol = 3;
  optional AclEndpoint source = 4;
  optional AclEndpoint destination = 5;
  optional uint32 source_port_eq = 6;
  optional uint32 destination_port_eq = 7;
  optional string description = 8;
}

message AclConfig {
  uint32 acl_id = 1;
  optional string name = 2;
  optional string description = 3;
  repeated AclRule rules = 4;
  AclKind kind = 5;
}

message AclBinding {
  string interface_name = 1;
  AclDirection direction = 2;
  uint32 acl_id = 3;
}

message DesiredDeviceState {
  string device_id = 1;
  repeated VlanConfig vlans = 2;
  repeated InterfaceConfig interfaces = 3;
  repeated AclConfig acls = 4;
  repeated AclBinding acl_bindings = 5;
  repeated uint32 delete_vlan_ids = 6;
  repeated uint32 delete_acl_ids = 7;
  repeated AclBinding delete_acl_bindings = 8;
}

message ObservedDeviceState {
  string device_id = 1;
  repeated VlanConfig vlans = 2;
  repeated InterfaceConfig interfaces = 3;
  repeated AclConfig acls = 4;
  repeated AclBinding acl_bindings = 5;
}

message StateScope {
  bool full = 1;
  repeated uint32 vlan_ids = 2;
  repeated string interface_names = 3;
  repeated uint32 acl_ids = 4;
}

message RollbackArtifactRef {
  string artifact_id = 1;
  string tx_id = 2;
  string device_id = 3;
  string storage_uri = 4;
  string checksum = 5;
}

message AdapterError {
  string code = 1;
  string message = 2;
  string normalized_error = 3;
  string raw_error_summary = 4;
  bool retryable = 5;
}

message AdapterResult {
  AdapterOperationStatus status = 1;
  bool changed = 2;
  repeated string warnings = 3;
  repeated AdapterError errors = 4;
  optional RollbackArtifactRef rollback_artifact = 5;
  optional ObservedDeviceState normalized_state = 6;
  string prepared_candidate_checksum = 7;
}

message GetCapabilitiesRequest {
  RequestContext context = 1;
  DeviceRef device = 2;
}

message GetCapabilitiesResponse {
  DeviceCapability capability = 1;
  repeated string warnings = 2;
  repeated AdapterError errors = 3;
}

message GetCurrentStateRequest {
  RequestContext context = 1;
  DeviceRef device = 2;
  StateScope scope = 3;
}

message GetCurrentStateResponse {
  ObservedDeviceState state = 1;
  repeated string warnings = 2;
  repeated AdapterError errors = 3;
}

message DryRunRequest {
  RequestContext context = 1;
  DeviceRef device = 2;
  DesiredDeviceState desired_state = 3;
}

message DryRunResponse {
  AdapterResult result = 1;
}

message PrepareRequest {
  RequestContext context = 1;
  DeviceRef device = 2;
  DesiredDeviceState desired_state = 3;
}

message PrepareResponse {
  AdapterResult result = 1;
}

message CommitRequest {
  RequestContext context = 1;
  DeviceRef device = 2;
  TransactionStrategy strategy = 3;
  uint32 confirm_timeout_secs = 4;
  string prepared_candidate_checksum = 5;
}

message CommitResponse {
  AdapterResult result = 1;
}

message FinalConfirmRequest {
  RequestContext context = 1;
  DeviceRef device = 2;
}

message FinalConfirmResponse {
  AdapterResult result = 1;
}

message RollbackRequest {
  RequestContext context = 1;
  DeviceRef device = 2;
  TransactionStrategy strategy = 3;
}

message RollbackResponse {
  AdapterResult result = 1;
}

message VerifyRequest {
  RequestContext context = 1;
  DeviceRef device = 2;
  DesiredDeviceState desired_state = 3;
  StateScope scope = 4;
}

message VerifyResponse {
  AdapterResult result = 1;
}

message RecoverRequest {
  RequestContext context = 1;
  DeviceRef device = 2;
  TransactionStrategy strategy = 3;
  RecoveryAction action = 4;
}

message RecoverResponse {
  AdapterResult result = 1;
}

message ForceUnlockRequest {
  RequestContext context = 1;
  DeviceRef device = 2;
  string lock_owner = 3;
  string reason = 4;
  bool break_glass_enabled = 5;
}

message ForceUnlockResponse {
  AdapterResult result = 1;
}
